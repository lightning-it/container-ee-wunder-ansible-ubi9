# yamllint disable rule:truthy
---
name: Container Build & Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build & push image to Quay.io
    runs-on: ubuntu-latest
    env:
      REGISTRY: quay.io

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate Quay variables/secrets
        shell: bash
        env:
          QUAY_NAMESPACE: ${{ vars.QUAY_NAMESPACE }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          RH_AUTOMATION_HUB_TOKEN: ${{ secrets.RH_AUTOMATION_HUB_TOKEN }}
        run: |
          set -euo pipefail

          fail=0

          if [ -z "${QUAY_NAMESPACE:-}" ]; then
            echo "::error::Missing required org/repo variable: vars.QUAY_NAMESPACE"
            fail=1
          fi

          if [ -z "${QUAY_USERNAME:-}" ]; then
            echo "::error::Missing required secret: secrets.QUAY_USERNAME"
            fail=1
          fi

          if [ -z "${QUAY_PASSWORD:-}" ]; then
            echo "::error::Missing required secret: secrets.QUAY_PASSWORD"
            fail=1
          fi

          if [ -z "${RH_AUTOMATION_HUB_TOKEN:-}" ]; then
            echo "::error::Missing required secret: secrets.RH_AUTOMATION_HUB_TOKEN"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "Quay configuration present (namespace + credentials + RH token)."

      - name: Compute image names and tags
        shell: bash
        env:
          QUAY_NAMESPACE: ${{ vars.QUAY_NAMESPACE }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY#*/}"
          image_repo="${repo#container-}"

          image_name_public="${REGISTRY}/${QUAY_NAMESPACE}/${image_repo}"
          image_name_certified="${REGISTRY}/${QUAY_NAMESPACE}/${image_repo}-certified"
          image_name_bootstrap="${REGISTRY}/${QUAY_NAMESPACE}/${image_repo}-bootstrap"
          release_tag="${{ github.event.release.tag_name }}"
          version="${release_tag#v}"
          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "IMAGE_NAME_PUBLIC=${image_name_public}"
            echo "IMAGE_NAME_CERTIFIED=${image_name_certified}"
            echo "IMAGE_NAME_BOOTSTRAP=${image_name_bootstrap}"
            echo "RELEASE_TAG=${release_tag}"
            echo "VERSION=${version}"
            echo "FULL_SHA=${full_sha}"
            echo "SHORT_SHA=${short_sha}"
            echo "CREATED=${created}"
          } >> "$GITHUB_ENV"

          echo "Using IMAGE_NAME_PUBLIC=${image_name_public}"
          echo "Using IMAGE_NAME_CERTIFIED=${image_name_certified}"
          echo "Using IMAGE_NAME_BOOTSTRAP=${image_name_bootstrap}"
          echo "Using RELEASE_TAG=${release_tag}"
          echo "Using VERSION=${version}"
          echo "Using SHORT_SHA=${short_sha}"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push public image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            COLLECTION_PROFILE=public
          tags: |
            ${{ env.IMAGE_NAME_PUBLIC }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_NAME_PUBLIC }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME_PUBLIC }}:sha-${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME_PUBLIC }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.FULL_SHA }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.CREATED }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.repository.description }}

      - name: Build and push certified image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            COLLECTION_PROFILE=certified
          secrets: |
            rh_automation_hub_token=${{ secrets.RH_AUTOMATION_HUB_TOKEN }}
          tags: |
            ${{ env.IMAGE_NAME_CERTIFIED }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_NAME_CERTIFIED }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME_CERTIFIED }}:sha-${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME_CERTIFIED }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.FULL_SHA }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.CREATED }}
            org.opencontainers.image.title=${{ github.event.repository.name }}-certified
            org.opencontainers.image.description=${{ github.event.repository.description }}

      - name: Build and push bootstrap image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            COLLECTION_PROFILE=bootstrap
          tags: |
            ${{ env.IMAGE_NAME_BOOTSTRAP }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_NAME_BOOTSTRAP }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME_BOOTSTRAP }}:sha-${{ env.SHORT_SHA }}
            ${{ env.IMAGE_NAME_BOOTSTRAP }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.FULL_SHA }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.CREATED }}
            org.opencontainers.image.title=${{ github.event.repository.name }}-bootstrap
            org.opencontainers.image.description=${{ github.event.repository.description }}

      - name: Verify pushed image tags
        shell: bash
        run: |
          set -euo pipefail

          for image in \
            "$IMAGE_NAME_PUBLIC" \
            "$IMAGE_NAME_CERTIFIED" \
            "$IMAGE_NAME_BOOTSTRAP"
          do
            docker buildx imagetools inspect "${image}:${RELEASE_TAG}" >/dev/null
            docker buildx imagetools inspect "${image}:${VERSION}" >/dev/null
            docker buildx imagetools inspect "${image}:sha-${SHORT_SHA}" >/dev/null
            docker buildx imagetools inspect "${image}:latest" >/dev/null
          done
